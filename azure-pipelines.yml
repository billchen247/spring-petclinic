# Maven
# Build your Java project and run tests with Apache Maven.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/java

trigger:
- main

#pool:
#  vmImage: "ubuntu-latest"


variables:
  artifactName: 'spring-petclinic'
  javaVersion: '1.17'

stages:

# =========================
# BUILD STAGE
# =========================
- stage: Build
  displayName: "Build Stage"
  jobs:
  - job: BuildJob
    displayName: "Build and Package"
    steps:

    # 🔹 1. Prepare SonarCloud
    - task: SonarCloudPrepare@4
      inputs:
        SonarCloud: 'sonarqubecloud'   # 👈 your service connection name
        organization: 'billchen247'   # 👈 SonarCloud org (IMPORTANT)
        projectKey: billchen247_spring_petclinic
        scannerMode: 'Other'
        
    # Build with Maven
    - task: Maven@4
      displayName: "Maven Build"
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'clean verify sonar:sonar'
        publishJUnitResults: true
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '$(javaVersion)'
        jdkArchitectureOption: 'x64'
        testResultsFiles: '**/surefire-reports/TEST-*.xml'
    
    # 🔹 3. Publish SonarCloud Result
    - task: SonarCloudPublish@4
      inputs:
        pollingTimeoutSec: '300'
        
    # Publish test results (extra safety)
    - task: PublishTestResults@2
      displayName: "Publish Test Results"
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '**/target/surefire-reports/*.xml'
        failTaskOnFailedTests: true

    # Publish code coverage (optional - keep if you use JaCoCo)
    - task: PublishCodeCoverageResults@2
      displayName: "Publish Code Coverage"
      inputs:
        summaryFileLocation: 'target/site/jacoco/jacoco.xml'
        pathToSources: 'src/main/java'
      continueOnError: true

    # Copy JAR to artifact staging
    - task: CopyFiles@2
      displayName: "Copy JAR to staging"
      inputs:
        SourceFolder: '$(System.DefaultWorkingDirectory)/target'
        Contents: '*.jar'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'

    # Debug (VERY useful if artifact issues happen)
    - script: |
        echo "=== Build Artifact Contents ==="
        ls -R $(Build.ArtifactStagingDirectory)
      displayName: "Debug Artifact Contents"

    # Publish classic build artifact for old format
#    - task: PublishBuildArtifacts@1
#      displayName: "Publish Artifact"
#      inputs:
#        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
#        ArtifactName: '$(artifactName)'
#        publishLocation: 'Container'

    - task: PublishPipelineArtifact@1
      displayName: "Publish Pipeline Artifact for CD pipeline"
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifact: '$(artifactName)'

# =========================
# DEPLOY STAGE
# =========================
- stage: Deploy
  displayName: "Deploy to Azure Web App"
  dependsOn: Build
  condition: succeeded()
  variables:
    - group: jdk17webapp_var_group
  jobs:
  - deployment: DeployWebApp
    displayName: "Deploy to Azure"
    environment: 'dev'
    strategy:
      runOnce:
        deploy:
          steps:

          # Download artifact
          - download: current
            artifact: $(artifactName)

          # Debug downloaded files
          - script: |
              echo "=== Pipeline Workspace ==="
              ls -R $(Pipeline.Workspace)
            displayName: "Debug Downloaded Artifact"

          - script: |
              JAR=$(find $(Pipeline.Workspace) -name "*.jar" | head -n 1)
              if [ -z "$JAR" ]; then
                echo "❌ No JAR found!"
                exit 1
              fi
              echo "✅ Found JAR: $JAR"
              mkdir -p $(Build.ArtifactStagingDirectory)/package
              cp "$JAR" $(Build.ArtifactStagingDirectory)/package/app.jar
              echo "✅ Created deployment packge $(Build.ArtifactStagingDirectory)/package/app.jar"
              ls -l $(Build.ArtifactStagingDirectory)
              if [ ! -f "$(Build.ArtifactStagingDirectory)/package/app.jar" ]; then
                echo "❌ JAR copy failed!"
                exit 1
              fi
            displayName: "Validate JAR exists"
          
          - task: ArchiveFiles@2
            displayName: "Create ZIP package"
            inputs:
              rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/package'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
              replaceExistingArchive: true

          - script: |
              echo "=== ZIP CONTENT ==="
              ls -l $(Build.ArtifactStagingDirectory)/app.zip
              unzip -l $(Build.ArtifactStagingDirectory)/app.zip
              
            displayName: "Verify ZIP"
            
 #         - task: AzureCLI@2
 #           inputs:
 #             azureSubscription: 'azure-conn'
 #             scriptType: 'bash'
 #             scriptLocation: 'inlineScript'
 #             inlineScript: |
 #               echo "Logged in identity:"
 #               az account show

          

          - script: |
              if [ -z "$(publishProfile)" ]; then
                echo "❌ publishProfile is EMPTY"
                exit 1
              else
                echo "✅ publishProfile is loaded"
              fi
            displayName: "Check publishProfile variable"


          - script: |
              echo "=== CURRENT DIR ==="
              pwd
          
              echo "=== LIST ROOT ==="
              ls -al
          
              echo "=== LIST WORKSPACE ==="
              ls -al $(Pipeline.Workspace)
          
              echo "=== RECURSIVE LIST ==="
              ls -R $(Pipeline.Workspace)
          
              echo "=== FIND ZIP ==="
              find $(Pipeline.Workspace) -name "*.zip"
          
              FILE=$(find $(Pipeline.Workspace) -name "*.zip" | head -n 1)
          
              if [ -z "$FILE" ]; then
                echo "❌ NO ZIP FOUND"
                exit 1
              fi
          
              echo "✅ ZIP FOUND: $FILE"
              ls -l "$FILE"
          
              echo "=== TRY UNZIP ==="
              unzip -l "$FILE" || echo "⚠️ unzip failed"
            displayName: "FULL DEBUG ZIP"

          # Deploy to Azure Web App
          - task: AzureWebApp@1
            displayName: "Deploy to Web App"
            inputs:
              #appType: 'webApp'
              # publishProfile: '$(publishProfile)' # for publish profile
              azureSubscription: 'azure-conn'   # <-- CHANGE THIS # for service connection
              appName: 'jdk17webapp'     # <-- CHANGE THIS
              #package: '$(Pipeline.Workspace)/$(artifactName)/**/*.jar'
              #deploymentMethod: 'runFromPackage'
              package: '$(Build.ArtifactStagingDirectory)/app.zip'
              deploymentMethod: 'runFromPackage'
              
