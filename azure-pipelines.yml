# Maven
# Build your Java project and run tests with Apache Maven.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/java

trigger:
- main

pool:
  vmImage: "ubuntu-latest"

variables:
  artifactName: 'spring-petclinic'
  javaVersion: '1.17'

stages:

# =========================
# BUILD STAGE
# =========================
- stage: Build
  displayName: "Build Stage"
  jobs:
  - job: BuildJob
    displayName: "Build and Package"
    steps:

    # Build with Maven
    - task: Maven@4
      displayName: "Maven Build"
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'clean package'
        options: '-DskipTests'
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '$(javaVersion)'
        jdkArchitectureOption: 'x64'
        publishJUnitResults: true
        testResultsFiles: '**/surefire-reports/TEST-*.xml'

    # Publish test results (extra safety)
    - task: PublishTestResults@2
      displayName: "Publish Test Results"
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '**/target/surefire-reports/*.xml'
        failTaskOnFailedTests: true

    # Publish code coverage (optional - keep if you use JaCoCo)
    - task: PublishCodeCoverageResults@2
      displayName: "Publish Code Coverage"
      inputs:
        summaryFileLocation: 'target/site/jacoco/jacoco.xml'
        pathToSources: 'src/main/java'
      continueOnError: true

    # Copy JAR to artifact staging
    - task: CopyFiles@2
      displayName: "Copy JAR to staging"
      inputs:
        SourceFolder: '$(System.DefaultWorkingDirectory)/target'
        Contents: '*.jar'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'

    # Debug (VERY useful if artifact issues happen)
    - script: |
        echo "=== Build Artifact Contents ==="
        ls -R $(Build.ArtifactStagingDirectory)
      displayName: "Debug Artifact Contents"

    # Publish classic build artifact for old format
#    - task: PublishBuildArtifacts@1
#      displayName: "Publish Artifact"
#      inputs:
#        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
#        ArtifactName: '$(artifactName)'
#        publishLocation: 'Container'

    - task: PublishPipelineArtifact@1
      displayName: "Publish Pipeline Artifact for CD pipeline"
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifact: '$(artifactName)'

# =========================
# DEPLOY STAGE
# =========================
- stage: Deploy
  displayName: "Deploy to Azure Web App"
  dependsOn: Build
  condition: succeeded()
  variables:
    - group: jdk17webapp_var_group
  jobs:
  - deployment: DeployWebApp
    displayName: "Deploy to Azure"
    environment: 'dev'
    strategy:
      runOnce:
        deploy:
          steps:

          # Download artifact
          - download: current
            artifact: $(artifactName)

          # Debug downloaded files
          - script: |
              echo "=== Pipeline Workspace ==="
              ls -R $(Pipeline.Workspace)
            displayName: "Debug Downloaded Artifact"

 #         - task: AzureCLI@2
 #           inputs:
 #             azureSubscription: 'azure-conn'
 #             scriptType: 'bash'
 #             scriptLocation: 'inlineScript'
 #             inlineScript: |
 #               echo "Logged in identity:"
 #               az account show

          

          - script: |
              if [ -z "$(publishProfile)" ]; then
                echo "❌ publishProfile is EMPTY"
                exit 1
              else
                echo "✅ publishProfile is loaded"
              fi
            displayName: "Check publishProfile variable"

          # Deploy to Azure Web App
          - task: AzureWebApp@1
            displayName: "Deploy to Web App"
            inputs:
              appType: 'webApp'
              # publishProfile: '$(publishProfile)' # for publish profile
              azureSubscription: 'azure-conn'   # <-- CHANGE THIS # for service connection
              appName: 'jdk17webapp-fqe9bzf8a8ddbkct'     # <-- CHANGE THIS
              package: '$(Pipeline.Workspace)/$(artifactName)/**/*.jar'
