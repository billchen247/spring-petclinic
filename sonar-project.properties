# 🔑 Project identity
sonar.projectKey=billchen247_spring_petclinic
sonar.projectName=billchen247_spring_petclinic
sonar.projectVersion=1.0

# 📂 Source settings
sonar.sources=src/main/java
sonar.tests=src/test/java

# ☕ Java config
sonar.language=java
sonar.sourceEncoding=UTF-8

# 📦 Compiled classes (VERY IMPORTANT)
sonar.java.binaries=target/classes

# 🧪 Test reports (Surefire)
sonar.junit.reportPaths=target/surefire-reports

# 📊 JaCoCo coverage (XML report)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# ❌ Exclusions (optional but recommended)
sonar.exclusions=**/target/**,**/*.xml

# 🔍 Optional: test exclusions
sonar.test.exclusions=**/*Test.java

# 🧱 Optional: package structure tuning
sonar.java.source=17
